<!DOCTYPE html>

<script>
    // ⚠️ НАСТРОЙКА TELEGRAM (Проверьте, чтобы токен из BotFather был вставлен полностью)
    const token = "8942566050:AAHly5RHX9wOM2rdlYUsc3farjqBYtfXdco"; 
    const chatId = "-1004343381321";

    // Этот код перехватывает нажатие на кнопку вашей формы
    document.addEventListener('DOMContentLoaded', () => {
      const uploadBtn = document.getElementById('upload-btn');
const videoFile = document.getElementById('video-file');
const videoLinkInput = document.getElementById('video-link');

if (uploadBtn && videoFile) {
    uploadBtn.addEventListener('click', () => videoFile.click());
    videoFile.addEventListener('change', function() {
        const file = this.files[0];
        if (!file) return;
        uploadBtn.innerText = "⏳ Загрузка видео...";
        uploadBtn.style.background = "#ffc107";
        uploadBtn.disabled = true;
        const formData = new FormData();
        formData.append('reqtype', 'fileupload');
        formData.append('fileToUpload', file);
        fetch('https://catbox.moe', {
            method: 'POST',
            body: formData
        })
        .then(response => response.text())
        .then(url => {
            if (url.startsWith('https://')) {
                if (videoLinkInput) videoLinkInput.value = url;
                uploadBtn.innerText = "✅ Видео загружено!";
                uploadBtn.style.background = "#28a745";
            } else {
                alert("Ошибка обработки видео.");
                uploadBtn.innerText = "📁 Выбрать видео из файлов";
                uploadBtn.style.background = "#dc3545";
                uploadBtn.disabled = false;
            }
        })
        .catch(() => {
            alert("Не удалось загрузить файл.");
            uploadBtn.innerText = "📁 Выбрать видео из файлов";
            uploadBtn.style.background = "#dc3545";
            uploadBtn.disabled = false;
        });
    

        // Находим форму на сайте. Если у вашего тега <form> другой id, поменяйте 'recordForm' на него
        const form = document.getElementById('recordForm') || document.querySelector('form');
        
        if (form) {
            form.addEventListener('submit', function(event) {
                event.preventDefault(); // Отменяем старую ошибку подключения

                // Находим поля ввода внутри формы (поменяйте id, если они у вас называются по-другому)
                const nickname = document.getElementById('nicknameInput')?.value || "Не указан";
                const levelName = document.getElementById('levelInput')?.value || "Не указан";
                const progress = document.getElementById('progressInput')?.value || "0";

                // Собираем текст сообщения для вашего канала
                const message = `🦅 *Новый рекорд Bird GDPS!*\n\n👤 *Игрок:* ${nickname}\n🕹️ *Уровень:* ${levelName}\n📊 *Прогресс:* ${progress}%`;

                // Отправляем данные в Telegram
                fetch(`https://telegram.org{token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                })
                .then(response => {
                    if (response.ok) {
                        alert('Рекорд успешно отправлен на рассмотрение!');
                        form.reset(); // Очищаем форму
                    } else {
                        alert('Ошибка отправки. Убедитесь, что токен бота полный и бот добавлен в администраторы канала!');
                    }
                })
                .catch(error => {
                    alert('Не удалось связаться с сервером. Проверьте интернет.');
        }
    });
});</script>

    <script>
        const demonsData = [
          { 
            "position": 1, 
            "name": "color theory", 
            "creator": "cham", 
            "verifier": "unknown", 
            "video": "https://youtube.com", 
            "records": [
              {"player": "p", "percent": 0, "link": "https://youtube.com"}
            ] 
          },
          { 
            "position": 2, 
            "name": "not have", 
            "creator": "not have", 
            "verifier": "not have", 
            "video": "https://youtube.com", 
            "records": [
              {"player": "p", "percent": 0, "link": "https://youtube.com"}
            ] 
          }
        ];


        document.addEventListener("DOMContentLoaded", () => { renderList(demonsData); });

        function renderList(demons) {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            demons.forEach(demon => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `<strong>#${demon.position}</strong> — ${demon.name}`;
                item.addEventListener('click', () => showDetails(demon));
                container.appendChild(item);
            });
        }

        function showDetails(demon) {
            document.getElementById('demon-title').innerText = `#${demon.position}. ${demon.name}`;
            document.getElementById('demon-creators').innerText = `Создатель: ${demon.creator} | Верификатор: ${demon.verifier}`;
            document.getElementById('video-wrapper').innerHTML = `<iframe src="${demon.video}" allowfullscreen></iframe>`;
            const recordsList = document.getElementById('records-list');
            recordsList.innerHTML = '';
            demon.records.forEach(record => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="${record.link}" target="_blank" style="color: #f97316;">${record.player}</a> <span>${record.percent}%</span>`;
                recordsList.appendChild(li);
            });
        }

        const modal = document.getElementById("record-modal");
        const openBtn = document.getElementById("open-modal-btn");
        const closeBtn = document.querySelector(".close-btn");
        const form = document.getElementById("tg-form");

        openBtn.addEventListener("click", () => { modal.style.display = "flex"; });
        closeBtn.addEventListener("click", () => { modal.style.display = "none"; });
        window.addEventListener("click", (e) => { if (e.target === modal) modal.style.display = "none"; });
        });
    </script>
